<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker | Responsive Empty State</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Geist', 'sans-serif'] },
                    colors: {
                        brandBlue: '#002C5C',
                        brandPurple: '#4318FF',
                        brandGreen: '#05CD99',
                        brandRed: '#EE5D50',
                        bgLight: '#F4F7FE',
                        textGray: '#A3AED0'
                    }
                }
            }
        }
    </script>
    <style>
        .active-tab { color: #3B82F6; border-bottom: 4px solid #3B82F6; }
        .figma-card { box-shadow: 0px 18px 40px rgba(112, 144, 176, 0.08); }
        .job-row { border-bottom: 1px solid #E9EDF7; position: relative; }
        .job-row:last-child { border-bottom: none; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        
        .icon-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>

<body class="bg-bgLight min-h-screen font-sans antialiased p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        
        <header class="mb-12">
            <h1 class="text-3xl font-extrabold text-brandBlue tracking-tight mb-6">Job Application Tracker</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded border-[#E9EDF7] flex flex-col items-center">
                    <p class="font-black text-sm font-medium text-gray-700 mb-1">Total</p>
                    <p id="stat-total" class="text-3xl font-black text-brandBlue">0</p>
                </div>
                <div class="bg-white p-6 rounded border-[#E9EDF7] flex flex-col items-center">
                    <p class="font-black text-sm font-medium text-gray-700 mb-1">Interview</p>
                    <p id="stat-interview" class="text-3xl font-black text-brandGreen">0</p>
                </div>
                <div class="bg-white p-6 rounded border-[#E9EDF7] flex flex-col items-center">
                    <p class="font-black text-sm font-medium text-gray-700 mb-1">Rejected</p>
                    <p id="stat-rejected" class="text-3xl font-black text-brandRed">0</p>
                </div>
            </div>
        </header>
        <section>
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-brandBlue tracking-tight">Available Jobs</h2>
                
                </div>
                <div class="text-right flex justify-between items-end gap-2">
                    <span id="jobs-count" class="text-sm leading-relaxed font-medium font-black text-textGray mb-1">0</span>
                    <span class="text-sm leading-relaxed font-black font-medium text-textGray mb-1">jobs</span>
                    
                </div>
            </div>

            <div class="bg-white rounded-[32px] p-6 md:p-10 figma-card border border-[#E9EDF7] min-h-[400px]">
                <div class="flex gap-8 border-b border-[#E9EDF7] mb-4 overflow-x-auto no-scrollbar">
                    <button onclick="switchTab('all')" id="tab-all" class="pb-4 text-sm font-medium active-tab whitespace-nowrap transition-all">All</button>
                    <button onclick="switchTab('interview')" id="tab-interview" class="pb-4 text-sm font-medium text-textGray whitespace-nowrap transition-all">Interview</button>
                    <button onclick="switchTab('rejected')" id="tab-rejected" class="pb-4 text-sm font-medium text-textGray whitespace-nowrap transition-all">Rejected</button>
                </div>

                <div id="jobList" class="flex flex-col h-full justify-center">
                    </div>
            </div>
        </section>
    </div>
    <script>
        const initialJobs = [
            { id: 1, company: "Mobile First Corp", pos: "React Native Developer", loc: "Remote", type: "Full-time", sal: "$30,000-$17,5000", desc: "Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.", status: 'all', applied: false },
            { id: 2, company: "WebFlow Agency", pos: "Web Designer & Developer", loc: "Los Angeles, CA", type: "Part-time", sal: "$80,000-$120,000", desc: "Create stunning web experiences for high-profile clients. Must have portfolio and experience with modern web design trends.", status: 'all', applied: false },
            { id: 3, company: "DataViz Solutions", pos: "Data Visualization Specialist", loc: "Boston, MA", type: "Full-time", sal: "$125,000 - $165,000", desc: "Transform complex data into compelling visualizations. Required skills: D3.js, React, and strong analytical thinking.", status: 'all', applied: false },
            { id: 4, company: "CloudFirst Inc", pos: "Backend Developer", loc: "Seattle, WA", type: "Full-time", sal: "$140,000 - $190,000", desc: "Design and maintain scalable backend systems using Python and AWS. Work with modern DevOps practices and cloud infrastructure.", status: 'all', applied: false },
            { id: 5, company: "Innovation Labs", pos: "UI/UX Engineer", loc: "Austin, TX", type: "Full-time", sal: "$110,000 - $150,000", desc: "Create beautiful and functional user interfaces for our suite of products. Strong design skills and frontend development expertise required.", status: 'all', applied: false },
            { id: 6, company: "MegaCorp Solutions", pos: "JavaScript Developer", loc: "New York, NY", type: "Full-time", sal: "$130,000 - $170,00", desc: "Build enterprise applications with JavaScript and modern frameworks. We offer competitive compensation, health insurance, and professional development opportunities.", status: 'all', applied: false },
            { id: 7, company: "StartupXYZ", pos: "Full Stack Engineer", loc: "Remote", type: "Full-time", sal: "$120,00-$160,000", desc: "Join our fast-growing startup and work on our core platform. Experience with Node.js and React required. Great benefits and equity package included.", status: 'all', applied: false },
            { id: 8, company: "TechCorp Industries", pos: "Senior Frontend Developer", loc: "San Francisco, CA", type: "Full-time", sal: "$130,000 - $175,000", desc: "We are looking for an experienced Frontend Developer to build scalable web applications using React and TypeScript. You will work with a talented team on cutting-edge projects.", status: 'all', applied: false }
        ];
    </script>    
   
</body>
</html>
